workflow: GitHubFlow/v1
next-version: 0.0.0
tag-prefix: 'v'
semantic-version-format: Loose

major-version-bump-message: '(BREAKING CHANGE|^.+!:)'
minor-version-bump-message: '^feat(\([^)]+\))?:\s'
patch-version-bump-message: '^(fix|enhancement|perf|refactor|revert)(\([^)]+\))?:\s'
no-bump-message: '^(chore|docs|style|test|ci)(\([^)]+\))?:\s'
commit-message-incrementing: Enabled

strategies:
  - Fallback
  - MergeMessage
  - TaggedCommit
  - TrackReleaseBranches
  - VersionInBranchName

branches:
  main:
    regex: ^master$|^main$
    is-main-branch: true
    # increment: None -> the version only bumps when a conventional-commit message dictates it
    # (feat:/fix:/etc.); chore/docs/ci/style/test do NOT bump. ContinuousDeployment keeps SemVer
    # clean (0.1.2, not 0.1.1-1) between tags.
    increment: None
    mode: ContinuousDeployment
