project_name: workstation-agent
version: 2

builds:
  - main: ./cmd/workstation-agent
    env:
      # No CGO: a fully static binary the EC2 bootstrap can drop in /usr/local/bin.
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}}'
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    binary: '{{ .ProjectName }}'

snapshot:
  version_template: '{{ incpatch .Version }}'

archives:
  - formats:
      - zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  draft: false

changelog:
  use: git
  sort: asc
  filters:
    include:
      - "^feat:"
      - "^fix:"
      - "^perf:"
      - "^refactor:"
  groups:
    - title: '✨ New Features'
      regexp: '^feat(\([^)]*\))?:'
      order: 100
    - title: '🐛 Bug fixes'
      regexp: '^fix(\([^)]*\))?:'
      order: 200
    - title: '📦 Other work'
      order: 9999
